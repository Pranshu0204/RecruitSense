# RecruitSense — full-stack local environment.
#
# Brings up four services on a shared bridge network:
#   - qdrant   : vector store for the RAG knowledge base
#   - redis    : LLM-response cache
#   - backend  : FastAPI app on :8000 (depends on qdrant + redis)
#   - frontend : Streamlit recruiter UI on :8501
#
# Usage:
#   cp .env.example .env  &&  edit OPENROUTER_API_KEY
#   docker compose up --build
#
# First-time setup also requires seeding the vector store:
#   docker compose exec backend python -m backend.rag.ingest --recreate

name: recruitsense

services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: recruitsense-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: recruitsense-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: recruitsense-backend
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      REDIS_HOST: redis
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: recruitsense-frontend
    environment:
      RECRUITSENSE_API_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_storage:
  redis_data:
