# Continuous integration — lint + test on every push and PR to main.
#
# We deliberately do NOT run the fine-tuning suite here (transformers/torch
# wheels are several hundred MB and the runner doesn't have a GPU). The CI
# job validates only the backend + schemas + utils, with all external
# dependencies (Qdrant, Redis, OpenRouter) mocked at the test boundary.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            frontend/requirements.txt

      - name: Install backend deps (CPU-only torch wheel)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.4.0"
          pip install -r backend/requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run pytest
        env:
          OPENROUTER_API_KEY: dummy
          QDRANT_HOST: localhost
          REDIS_HOST: localhost
          LOG_LEVEL: WARNING
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (skip embedder warm-up)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: recruitsense-backend:ci
          build-args: |
            WARM_EMBEDDER=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: recruitsense-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
